<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Internal Login - Toko Perabotan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-200 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
        <h1 class="text-2xl font-bold text-center mb-6">Staff Login</h1>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block font-semibold">Username</label>
                <input type="text" id="username" class="w-full p-2 border rounded" required>
            </div>
            <div>
                <label class="block font-semibold">Password</label>
                <input type="password" id="password" class="w-full p-2 border rounded" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">Masuk</button>
        </form>
        <p id="errorMsg" class="text-red-500 text-center mt-3 hidden"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch(`/api/internal/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('internal_token', data.token);
                    localStorage.setItem('internal_role', data.role);
                    localStorage.setItem('internal_username', data.username);
                    window.location.href = '/internal.html';
                } else {
                    errorMsg.innerText = data.message || "Gagal login!";
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "Error connecting to server";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
