<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Pelanggan - Toko Perabotan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen py-8">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-lg border border-gray-700">
        <h2 class="text-2xl font-bold text-center mb-6 text-yellow-500">Daftar Akun Baru</h2>
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block font-semibold text-gray-300">Nama Lengkap</label>
                <input type="text" id="nama" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-yellow-500" required>
            </div>
            <div>
                <label class="block font-semibold text-gray-300">Email</label>
                <input type="email" id="email" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-yellow-500" required>
            </div>
            <div>
                <label class="block font-semibold text-gray-300">Password</label>
                <input type="password" id="password" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-yellow-500" required>
            </div>
            <div>
                <label class="block font-semibold text-gray-300">Nomor Telepon</label>
                <input type="text" id="telp" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-yellow-500">
            </div>
            <div>
                <label class="block font-semibold text-gray-300">Alamat Pengiriman</label>
                <textarea id="alamat" rows="3" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-yellow-500" required></textarea>
            </div>
            <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-3 rounded shadow transition">Daftar</button>
        </form>
        <p id="errorMsg" class="text-red-500 text-center mt-3 hidden"></p>
        <p class="text-center mt-4 text-sm text-gray-400">Sudah punya akun? <a href="/customer-login.html" class="text-yellow-500 hover:underline font-semibold">Login di sini</a></p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                nama_pelanggan: document.getElementById('nama').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                nomor_telepon: document.getElementById('telp').value,
                alamat: document.getElementById('alamat').value
            };

            try {
                const res = await fetch('/api/customer/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok) {
                    alert('Registrasi berhasil! Silakan login.');
                    window.location.href = '/customer-login.html';
                } else {
                    alert("Registration Failed: " + (data.error || data.message || "Unknown error"));
                }
            } catch (err) {
                alert("Registration Failed: " + err.message);
            }
        });
    </script>
</body>
</html>
