<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Pelanggan - Toko Perabotan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md border border-gray-700">
        <h2 class="text-2xl font-bold text-center mb-6 text-yellow-500">Login Pelanggan</h2>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block font-semibold text-gray-300">Email</label>
                <input type="email" id="email" class="w-full p-3 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-yellow-500" required>
            </div>
            <div>
                <label class="block font-semibold text-gray-300">Password</label>
                <input type="password" id="password" class="w-full p-3 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-yellow-500" required>
            </div>
            <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-3 rounded shadow transition">Login</button>
        </form>
        <p id="errorMsg" class="text-red-500 text-center mt-3 hidden"></p>
        <p class="text-center mt-4 text-sm text-gray-400">Belum punya akun? <a href="/customer-register.html" class="text-yellow-500 hover:underline font-semibold">Daftar di sini</a></p>
        <div class="mt-4 text-center"><a href="/index.html" class="text-sm text-gray-500 hover:text-gray-300 hover:underline transition">Kembali ke Beranda</a></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/customer/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem('customer_token', data.token);
                    localStorage.setItem('customer_nama', data.nama);
                    window.location.href = '/index.html';
                } else {
                    alert("Login Failed: " + (data.error || data.message || "Unknown error"));
                }
            } catch (err) {
                alert("Login Failed: " + err.message);
            }
        });
    </script>
</body>
</html>
